version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskboard
      POSTGRES_PASSWORD: taskboard
      POSTGRES_DB: taskboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskboard"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: taskboard
      DB_PASSWORD: taskboard
      DB_NAME: taskboard
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      ENABLE_DOCS: "true"        # set to "false" to hide Swagger UI
      DELETE_TAP_COUNT: "3"      # taps/clicks required to delete a box
      SEPARATE_ADD_TAB: "false"       # set to "true" for dedicated manage tab
      MAX_BOARDS: "5"                 # max number of boards allowed
      DEFAULT_CANVAS_WIDTH: "1280"
      DEFAULT_CANVAS_HEIGHT: "800"
      RUST_LOG: "info"

volumes:
  pgdata:
